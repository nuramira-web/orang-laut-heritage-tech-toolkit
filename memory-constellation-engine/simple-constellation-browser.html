<!DOCTYPE html>
<html>
<head>
  <title>Memory Constellation Engine</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f8f4ec;
      color: #1f2933;
    }

    header {
      padding: 2rem;
      background: #efe4d0;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }

    .node {
      background: white;
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .tag {
      display: inline-block;
      background: #f0eadf;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      margin: 0.15rem;
      font-size: 0.8rem;
    }

    .emotion {
      display: inline-block;
      background: #eadfd5;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      margin: 0.15rem;
      font-size: 0.8rem;
    }

    .links {
      margin-top: 0.7rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>

<body>
  <header>
    <h1>Memory Constellation Engine</h1>
    <p>Explore relationships between memories, rituals, foodways, places, emotions, and maritime knowledge.</p>
  </header>

  <main>
    <input id="searchInput" type="text" placeholder="Search memories, themes, emotions, rituals, places..." />
    <div id="results"></div>
  </main>

  <script>
    const memoryGraph = {
      nodes: [
        {
          id: "MEM-001",
          type: "ritual_memory",
          title: "Malam Tujuh Likur Memory",
          description: "A memory of lights, prayer, and preparation before Hari Raya on Pulau Brani.",
          themes: ["Ramadan", "Hari Raya", "ritual", "family memory"],
          emotions: ["belonging", "reverence", "longing"],
          source_id: "PB-ARCH-002",
          public_use: "Yes"
        },
        {
          id: "MEM-002",
          type: "foodway",
          title: "Communal Hari Raya Cooking",
          description: "Memories of preparing food with family and neighbours before Hari Raya.",
          themes: ["foodways", "women’s work", "festival preparation"],
          emotions: ["joy", "care", "continuity"],
          source_id: "PB-OH-001",
          public_use: "Yes"
        },
        {
          id: "MEM-003",
          type: "place",
          title: "Former Village Area",
          description: "A remembered area of former kampong life on Pulau Brani.",
          themes: ["village life", "resettlement", "family memory"],
          emotions: ["loss", "belonging", "nostalgia"],
          source_id: "PB-LOC-001",
          public_use: "Limited"
        },
        {
          id: "MEM-004",
          type: "maritime_memory",
          title: "Sea Route Between Islands",
          description: "A remembered route used for movement between Pulau Brani and surrounding islands.",
          themes: ["sea routes", "mobility", "navigation"],
          emotions: ["freedom", "resilience", "wonder"],
          source_id: "PB-ARCH-003",
          public_use: "Yes"
        }
      ],
      links: [
        { source: "MEM-001", target: "MEM-002", relationship: "linked_to_preparation" },
        { source: "MEM-001", target: "MEM-003", relationship: "occurred_at" },
        { source: "MEM-003", target: "MEM-004", relationship: "linked_to_route" },
        { source: "MEM-002", target: "MEM-003", relationship: "shared_by_family" }
      ]
    };

    function findLinkedNodes(nodeId) {
      return memoryGraph.links
        .filter(link => link.source === nodeId || link.target === nodeId)
        .map(link => {
          const linkedId = link.source === nodeId ? link.target : link.source;
          const linkedNode = memoryGraph.nodes.find(node => node.id === linkedId);
          return { ...linkedNode, relationship: link.relationship };
        });
    }

    function renderNodes(nodes) {
      const results = document.getElementById("results");
      results.innerHTML = "";

      if (nodes.length === 0) {
        results.innerHTML = "<p>No matching memories found.</p>";
        return;
      }

      nodes.forEach(node => {
        const linkedNodes = findLinkedNodes(node.id);

        const themeTags = node.themes.map(theme => `<span class="tag">${theme}</span>`).join(" ");
        const emotionTags = node.emotions.map(emotion => `<span class="emotion">${emotion}</span>`).join(" ");

        const linkedList = linkedNodes.map(linked =>
          `<li>${linked.relationship}: <strong>${linked.title}</strong></li>`
        ).join("");

        const div = document.createElement("div");
        div.className = "node";

        div.innerHTML = `
          <h2>${node.title}</h2>
          <p>${node.description}</p>
          <p><strong>Type:</strong> ${node.type}</p>
          <p><strong>Source:</strong> ${node.source_id}</p>
          <div>${themeTags}</div>
          <div>${emotionTags}</div>
          <div class="links">
            <strong>Connected memories:</strong>
            <ul>${linkedList}</ul>
          </div>
        `;

        results.appendChild(div);
      });
    }

    function searchNodes() {
      const searchTerm = document.getElementById("searchInput").value.toLowerCase();

      const filtered = memoryGraph.nodes.filter(node => {
        const text = JSON.stringify(node).toLowerCase();
        return text.includes(searchTerm);
      });

      renderNodes(filtered);
    }

    document.getElementById("searchInput").addEventListener("input", searchNodes);

    renderNodes(memoryGraph.nodes);
  </script>
</body>
</html>
